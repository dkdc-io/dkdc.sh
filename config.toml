# dkdc.sh: Zorto configuration
base_url = "https://dkdc.sh"
title = "dkdc.sh"
generate_llms_txt = false

compile_sass = true
slugify.paths = "safe"

[markdown]
highlight_code = true
insert_anchor_links = "right"
highlight_theme = "css"
highlight_themes_css = [
  { theme = "base16-ocean-dark", filename = "syntax-dark.css" },
]
render_emoji = true
external_links_target_blank = true
external_links_no_follow = true
external_links_no_referrer = true
smart_punctuation = true

[extra]
logo_text = "dkdc.sh"
author = "Cody"
default_og_image = "dkdc2-logo-dark.png"
favicon = "/dkdc2-favicon-32.png"
favicon_mimetype = "image/png"

menu_items = []

copyright_html = '<a href="/">dkdc.sh</a> by <a href="https://dkdc.io" target="_blank" rel="noopener">dkdc.io</a> via <a href="https://zorto.dev" target="_blank" rel="noopener">Zorto</a>'
